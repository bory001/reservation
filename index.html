<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>사내 예약 시스템 (법무법인 감천)</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a5c">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a3a5c;
    --primary-light: #2d5f8a;
    --bg: #f4f6f9;
    --surface: #ffffff;
    --border: #dde3ec;
    --text: #1a2433;
    --text-muted: #7a8ba0;
    --room1: #3b82f6;
    --room2: #8b5cf6;
    --room3: #10b981;
    --parking: #f59e0b;
    --car: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 잠금 화면 ── */
  #lockScreen {
    position: fixed; inset: 0; background: var(--primary);
    display: flex; align-items: center; justify-content: center; z-index: 999;
  }
  .lock-box {
    background: white; border-radius: 20px; padding: 2rem 1.75rem 1.75rem;
    width: 90%; max-width: 300px; text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  .lock-icon { font-size: 38px; margin-bottom: 0.6rem; }
  .lock-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 0.2rem; line-height: 1.4; }
  .lock-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 1.2rem; }
  .lock-error { font-size: 12px; color: #ef4444; min-height: 18px; margin-bottom: 0.5rem; font-weight: 600; }

  /* 비번 도트 */
  .pw-dots { display: flex; gap: 14px; margin-bottom: 8px; }
  .pw-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid #dde3ec; background: transparent; transition: all .2s; }
  .pw-dot.filled { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px rgba(26,58,92,.4); }
  .pw-dot.error { background: #ef4444; border-color: #ef4444; }

  /* 키패드 */
  .pw-keypad { display: grid; grid-template-columns: repeat(3, 72px); gap: 9px; margin-top: 4px; }
  .kbtn {
    height: 60px; border-radius: 12px; background: #f4f6f9; border: 1px solid #dde3ec;
    color: var(--text); font-family: inherit; font-size: 1.35rem; font-weight: 700;
    cursor: pointer; transition: all .12s; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .kbtn:hover { background: #e8edf4; }
  .kbtn:active { background: var(--primary); color: white; transform: scale(.93); }
  .kbtn.del { font-size: 1.1rem; color: var(--text-muted); }
  .kbtn.empty { visibility: hidden; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

  #app { display: none; flex-direction: column; min-height: 100vh; }
  header { background: var(--primary); color: white; padding: 0.5rem 1rem; min-height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 8px; }
  .header-left h1 { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .header-left .subtitle { font-size: 10px; opacity: 0.7; white-space: nowrap; }
  .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  @media (max-width: 480px) {
    header { padding: 0.4rem 0.75rem; gap: 8px; }
    .header-left h1 { font-size: 12px; }
    .header-left .subtitle { font-size: 9px; }
    .hdr-btn { font-size: 10px; padding: 4px 7px; }
    .sync-dot-wrap { display: none; }
  }
  .sync-dot-wrap { display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }
  .sync-dot.off { background: #ef4444; }
  .sync-label { font-size: 10px; color: #6ee7b7; }
  .hdr-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 9px; border-radius: 16px; font-size: 11px; font-family: inherit; cursor: pointer; white-space: nowrap; }

  .main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; padding: 1.5rem; max-width: 1300px; margin: 0 auto; }
  .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }

  .calendar-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .calendar-header h2 { font-size: 17px; font-weight: 700; color: var(--primary); }
  .nav-btn { background: none; border: 1px solid var(--border); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 16px; color: var(--text); display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { background: var(--bg); }

  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px 10px 4px; gap: 2px; }
  .weekday { text-align: center; font-size: 11px; font-weight: 500; color: var(--text-muted); }
  .weekday:first-child { color: #ef4444; }
  .weekday:last-child { color: #3b82f6; }

  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 4px 10px 10px; gap: 3px; }
  .day-cell { border-radius: 8px; padding: 5px 4px; cursor: pointer; transition: background 0.15s; display: flex; flex-direction: column; align-items: flex-start; min-height: 70px; border: 1px solid transparent; }
  .day-cell:hover:not(.other-month) { background: #eef3fa; border-color: var(--border); }
  .day-cell.today { background: #eff6ff; border-color: #93c5fd; }
  .day-cell.selected { background: var(--primary); border-color: var(--primary); }
  .day-cell.selected .day-num { color: white !important; }
  .day-cell.other-month { opacity: 0.3; cursor: default; }
  .day-num { font-size: 12px; font-weight: 600; line-height: 1; color: var(--text); margin-bottom: 3px; }
  .day-cell:nth-child(7n+1) .day-num { color: #ef4444; }
  .day-cell:nth-child(7n) .day-num { color: #3b82f6; }
  .day-badges { display: flex; flex-wrap: wrap; gap: 2px; width: 100%; }
  .badge { font-size: 9px; padding: 1px 4px; border-radius: 3px; color: white; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

  .legend { padding: 0.75rem 1.25rem; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  .sidebar { display: flex; flex-direction: column; gap: 1rem; }
  .panel-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-header h3 { font-size: 14px; font-weight: 700; color: var(--primary); }
  .selected-date-label { font-size: 11px; color: var(--text-muted); background: var(--bg); padding: 3px 9px; border-radius: 20px; font-weight: 500; }

  .form-body { padding: 1rem 1.25rem; }
  .form-group { margin-bottom: 0.85rem; }
  .form-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-select { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; }
  .form-input:focus, .form-select:focus { border-color: var(--primary-light); }
  .time-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px; align-items: center; }
  .time-sep { font-size: 13px; color: var(--text-muted); text-align: center; }
  .submit-btn { width: 100%; padding: 11px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 0.4rem; }
  .submit-btn:hover { background: var(--primary-light); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .res-list { padding: 0 1.25rem 1.25rem; max-height: 380px; overflow-y: auto; }
  .res-empty { padding: 1.5rem 0; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 1.8; }
  .res-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .res-item:last-child { border-bottom: none; }
  .res-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .res-info { flex: 1; }
  .res-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .res-time { font-size: 12px; color: var(--text-muted); }
  .res-who { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .res-delete { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 15px; padding: 0; line-height: 1; }
  .res-delete:hover { color: #ef4444; }
  .res-edit { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 14px; padding: 0; line-height: 1; margin-right: 4px; }
  .res-edit:hover { color: var(--primary-light); }
  .res-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .overlap-warn { font-size: 11px; color: #ef4444; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 6px 10px; margin-bottom: 8px; display: none; }
  .overlap-warn.show { display: block; }

  /* 모바일 패널 */
  .mobile-day-panel { display: none; background: var(--surface); border-top: 2px solid var(--primary); padding: 1rem; animation: slideDown 0.2s ease; }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .mdp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .mdp-date { font-size: 15px; font-weight: 700; color: var(--primary); }
  .mdp-add-btn { background: var(--primary); color: white; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .mdp-res-list { margin-bottom: 0.5rem; }
  .mdp-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 1rem 0; }
  .mdp-form { border-top: 1px solid var(--border); padding-top: 1rem; display: none; margin-top: 0.5rem; }
  .mdp-form.show { display: block; }
  .mdp-form-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 0.75rem; }

  /* ── 모달 공통 ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 500; padding: 1rem; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 1.75rem; width: 100%; max-width: 360px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 1.2rem; }
  .modal-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.15s; margin-bottom: 0.7rem; }
  .modal-input:focus { border-color: var(--primary); }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0.75rem; }
  .modal-cancel { padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; }
  .modal-confirm { padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .modal-error { font-size: 12px; color: #ef4444; min-height: 16px; margin-top: 2px; }

  /* ── 예약 항목 관리 모달 ── */
  .room-list { margin-bottom: 1rem; }
  .room-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .room-row:last-child { border-bottom: none; }
  .room-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
  .room-color-dot:hover { transform: scale(1.2); }
  .room-name-input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; color: var(--text); outline: none; }
  .room-name-input:focus { border-color: var(--primary); }
  .room-del-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 16px; padding: 0; line-height: 1; flex-shrink: 0; }
  .room-del-btn:hover { color: #ef4444; }
  .add-room-btn { width: 100%; padding: 9px; background: var(--bg); border: 1px dashed var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text-muted); cursor: pointer; margin-bottom: 1rem; }
  .add-room-btn:hover { border-color: var(--primary); color: var(--primary); }

  /* 색상 피커 팝업 */
  .color-picker-popup { position: absolute; background: white; border: 1px solid var(--border); border-radius: 10px; padding: 8px; display: none; gap: 6px; flex-wrap: wrap; width: 160px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 600; }
  .color-picker-popup.show { display: flex; }
  .color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
  .color-swatch:hover { transform: scale(1.15); border-color: var(--border); }
  .color-swatch.selected { border-color: var(--text) !important; }

  /* ── 멀티셀렉트 콤보박스 ── */
  .multi-select-wrap { position: relative; width: 100%; }
  .multi-select-trigger {
    width: 100%; padding: 9px 32px 9px 11px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text);
    background: var(--surface); outline: none; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    min-height: 38px; user-select: none; transition: border-color 0.15s;
    flex-wrap: wrap; gap: 4px;
  }
  .multi-select-trigger:focus, .multi-select-trigger.open { border-color: var(--primary-light); }
  .multi-select-arrow { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 11px; transition: transform 0.2s; }
  .multi-select-trigger.open + .multi-select-arrow { transform: translateY(-50%) rotate(180deg); }
  .multi-select-placeholder { color: var(--text-muted); font-size: 14px; }
  .multi-select-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--primary); color: white; border-radius: 4px;
    padding: 2px 6px; font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .multi-select-tag-x { cursor: pointer; font-size: 13px; line-height: 1; opacity: 0.8; }
  .multi-select-tag-x:hover { opacity: 1; }
  .multi-select-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: white; border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); z-index: 400; display: none;
    max-height: 220px; overflow-y: auto;
  }
  .multi-select-dropdown.open { display: block; }
  .ms-option {
    display: flex; align-items: center; gap: 8px; padding: 9px 12px;
    cursor: pointer; font-size: 13px; color: var(--text);
    transition: background 0.1s; border-bottom: 1px solid var(--border);
  }
  .ms-option:last-child { border-bottom: none; }
  .ms-option:hover { background: #eef3fa; }
  .ms-option.checked { background: #eff6ff; }
  .ms-checkbox {
    width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 4px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    background: white; transition: all 0.15s;
  }
  .ms-option.checked .ms-checkbox { background: var(--primary); border-color: var(--primary); }
  .ms-checkbox::after { content: '✓'; color: white; font-size: 11px; display: none; font-weight: 700; }
  .ms-option.checked .ms-checkbox::after { display: block; }
  .ms-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .ms-name { flex: 1; }

  /* ── 시간 숫자 선택 ── */
  /* ── 시간 커스텀 피커 ── */
  .time-pick { display: flex; align-items: center; gap: 3px; position: relative; }
  .modal-time-pick { display: flex; align-items: center; gap: 3px; position: relative; }
  .tp-colon { font-size: 16px; font-weight: 700; color: var(--text-muted); padding: 0 1px; }

  /* 트리거 버튼 (기존 select 대체) */
  .tp-btn {
    min-width: 52px; padding: 8px 6px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 15px; font-family: inherit; color: var(--text); background: var(--surface);
    outline: none; cursor: pointer; text-align: center; font-weight: 600;
    transition: border-color 0.15s; user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .tp-btn:focus, .tp-btn.open { border-color: var(--primary-light); background: #eff6ff; }
  .modal-time-pick .tp-btn:focus,
  .modal-time-pick .tp-btn.open { border-color: var(--primary); background: #eff6ff; }

  /* 드롭다운 팝업 */
  .tp-popup {
    display: none; position: fixed; background: white;
    border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18); z-index: 1000;
    padding: 8px; width: 220px;
  }
  .tp-popup.show { display: block; }

  /* 숫자 격자 */
  .tp-grid { display: grid; gap: 4px; }
  .tp-grid.hour-grid { grid-template-columns: repeat(5, 1fr); }
  .tp-grid.min-grid  { grid-template-columns: repeat(6, 1fr); }
  .tp-cell {
    padding: 7px 2px; text-align: center; border-radius: 7px;
    font-size: 13px; font-weight: 600; font-family: inherit;
    cursor: pointer; color: var(--text); background: none; border: none;
    transition: background 0.1s, color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .tp-cell:hover { background: #eef3fa; }
  .tp-cell.selected { background: var(--primary); color: white; }
  .tp-popup-title { font-size: 10px; font-weight: 600; color: var(--text-muted); text-align: center; margin-bottom: 5px; letter-spacing: 0.5px; text-transform: uppercase; }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--primary); color: white; padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 700; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #ef4444; }
  .loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: #e8a020; width: 0%; transition: width 0.3s; z-index: 800; }

  @media (max-width: 768px) {
    .main-layout { grid-template-columns: 1fr; padding: 0.75rem; gap: 0.75rem; }
    .sidebar { display: none; }
    .mobile-day-panel { display: block; border-radius: 0 0 12px 12px; }
    .days-grid { padding: 4px 6px 8px; gap: 2px; }
    .day-cell { min-height: unset; padding: 5px 3px; border-radius: 6px; }
    .day-num { font-size: 13px; margin-bottom: 3px; }
    .badge { font-size: 0; width: 7px; height: 7px; border-radius: 50%; padding: 0; flex-shrink: 0; }
    .day-badges { gap: 2px; }
    .weekdays { padding: 6px 6px 2px; }
    .weekday { font-size: 11px; }
    .calendar-header { padding: 0.75rem 1rem; }
    .legend { gap: 6px; padding: 0.6rem 1rem; }
    .legend-item { font-size: 10px; }
  }
  @media (max-width: 380px) {
    .day-num { font-size: 12px; }
    .badge { width: 6px; height: 6px; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- 잠금 화면 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">📅</div>
    <div class="lock-title">사내 예약 시스템<br>(법무법인 감천)</div>
    <div class="lock-sub">비밀번호를 입력하세요</div>
    <!-- 도트 표시 -->
    <div class="pw-dots">
      <div class="pw-dot" id="pd0"></div>
      <div class="pw-dot" id="pd1"></div>
      <div class="pw-dot" id="pd2"></div>
      <div class="pw-dot" id="pd3"></div>
    </div>
    <div class="lock-error" id="lockError"></div>
    <!-- 숫자 키패드 -->
    <div class="pw-keypad">
      <button class="kbtn" onclick="lockKey('1')">1</button>
      <button class="kbtn" onclick="lockKey('2')">2</button>
      <button class="kbtn" onclick="lockKey('3')">3</button>
      <button class="kbtn" onclick="lockKey('4')">4</button>
      <button class="kbtn" onclick="lockKey('5')">5</button>
      <button class="kbtn" onclick="lockKey('6')">6</button>
      <button class="kbtn" onclick="lockKey('7')">7</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCitGkZcA9rop79BtXJzTBFeez05EYhDoM",
    authDomain: "reservation-928c2.firebaseapp.com",
    databaseURL: "https://reservation-928c2-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "reservation-928c2",
    storageBucket: "reservation-928c2.firebasestorage.app",
    messagingSenderId: "744951363022",
    appId: "1:744951363022:web:5cd0645879e349c5ece79f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const COLOR_SWATCHES = [
    '#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444',
    '#ec4899','#06b6d4','#84cc16','#f97316','#64748b',
    '#0ea5e9','#a855f7','#22c55e','#eab308','#dc2626'
  ];

  // 기본 예약 항목
  const DEFAULT_ROOMS = [
    {id:'r1', name:'2층 회의실 1', color:'#3b82f6'},
    {id:'r2', name:'2층 회의실 2', color:'#8b5cf6'},
    {id:'r3', name:'5층 회의실 1', color:'#10b981'},
    {id:'p',  name:'주차장',       color:'#f59e0b'},
    {id:'c',  name:'법인 차량',    color:'#ef4444'}
  ];

  let rooms = [...DEFAULT_ROOMS];
  let reservations = {}, currentDate = new Date(), selectedDate = null, currentPassword = '1234';
  let editingRooms = []; // 모달 임시 편집용
  let activeColorTarget = null; // 색상 피커 대상

  const isMobile = () => window.innerWidth <= 768;

  function setLoading(on) {
    const b = document.getElementById('loadingBar');
    b.style.width = on ? '70%' : '100%';
    if (!on) setTimeout(() => b.style.width = '0%', 300);
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2500);
  }

  function getRoomById(id) { return rooms.find(r => r.id === id) || {name: id, color: '#888'}; }

  /* ── 멀티셀렉트 콤보박스 초기화 ── */
  const msInstances = {}; // key → {selectedIds, trigger, dropdown, placeholder}

  function createMultiSelect(triggerId, dropdownId, placeholderId) {
    const trigger = document.getElementById(triggerId);
    const dropdown = document.getElementById(dropdownId);
    const placeholder = document.getElementById(placeholderId);
    if (!trigger || !dropdown) return;
    const key = triggerId;
    msInstances[key] = { selectedIds: [], trigger, dropdown, placeholder };

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = dropdown.classList.contains('open');
      // 다른 드롭다운 닫기
      Object.values(msInstances).forEach(inst => {
        inst.dropdown.classList.remove('open');
        inst.trigger.classList.remove('open');
      });
      if (!isOpen) {
        dropdown.classList.add('open');
        trigger.classList.add('open');
      }
    });

    document.addEventListener('click', () => {
      dropdown.classList.remove('open');
      trigger.classList.remove('open');
    });
    dropdown.addEventListener('click', e => e.stopPropagation());
  }

  function renderMultiSelectOptions(key) {
    const inst = msInstances[key];
    if (!inst) return;
    inst.dropdown.innerHTML = '';
    rooms.forEach(r => {
      const opt = document.createElement('div');
      const checked = inst.selectedIds.includes(r.id);
      opt.className = 'ms-option' + (checked ? ' checked' : '');
      opt.innerHTML = `<div class="ms-checkbox"></div><div class="ms-dot" style="background:${r.color}"></div><span class="ms-name">${r.name}</span>`;
      opt.addEventListener('click', () => {
        if (inst.selectedIds.includes(r.id)) {
          inst.selectedIds = inst.selectedIds.filter(id => id !== r.id);
        } else {
          inst.selectedIds.push(r.id);
        }
        renderMultiSelectOptions(key);
        renderMultiSelectTrigger(key);
      });
      inst.dropdown.appendChild(opt);
    });
  }

  function renderMultiSelectTrigger(key) {
    const inst = msInstances[key];
    if (!inst) return;
    // 태그 형식으로 표시
    const tagArea = inst.trigger;
    // placeholder span 제거 후 재구성
    tagArea.innerHTML = '';
    if (inst.selectedIds.length === 0) {
      tagArea.innerHTML = '<span class="multi-select-placeholder">선택하세요</span>';
    } else {
      inst.selectedIds.forEach(id => {
        const room = getRoomById(id);
        const tag = document.createElement('span');
        tag.className = 'multi-select-tag';
        tag.style.background = room.color;
        tag.innerHTML = `${room.name} <span class="multi-select-tag-x" data-id="${id}">✕</span>`;
        tag.querySelector('.multi-select-tag-x').addEventListener('click', e => {
          e.stopPropagation();
          inst.selectedIds = inst.selectedIds.filter(sid => sid !== id);
          renderMultiSelectOptions(key);
          renderMultiSelectTrigger(key);
        });
        tagArea.appendChild(tag);
      });
    }
  }

  function resetMultiSelect(key) {
    const inst = msInstances[key];
    if (!inst) return;
    inst.selectedIds = [];
    renderMultiSelectOptions(key);
    renderMultiSelectTrigger(key);
  }

  // 예약 항목 셀렉트 채우기
  function populateSelects() {
    // 멀티셀렉트 옵션 재렌더
    ['msTrigger', 'mMsTrigger'].forEach(key => {
      if (msInstances[key]) {
        // 선택된 항목 중 없어진 room 제거
        msInstances[key].selectedIds = msInstances[key].selectedIds.filter(id => rooms.find(r => r.id === id));
        renderMultiSelectOptions(key);
        renderMultiSelectTrigger(key);
      }
    });
    // 수정 모달 select
    const editSel = document.getElementById('editRoom');
    if (editSel) {
      const cur = editSel.value;
      editSel.innerHTML = '';
      rooms.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id; opt.textContent = r.name;
        editSel.appendChild(opt);
      });
      if (rooms.find(r => r.id === cur)) editSel.value = cur;
    }
  }

  // 범례 렌더
  function renderLegend() {
    const el = document.getElementById('legend');
    el.innerHTML = '';
    rooms.forEach(r => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-dot" style="background:${r.color}"></div>${r.name}`;
      el.appendChild(item);
    });
  }

  async function loadConfig() {
    try {
      const snap = await get(ref(db, 'config'));
      if (snap.exists()) {
        const cfg = snap.val();
        if (cfg.password) currentPassword = cfg.password;
        if (cfg.rooms && Array.isArray(cfg.rooms)) rooms = cfg.rooms;
      } else {
        await set(ref(db, 'config/password'), '1234');
      }
    } catch(e) { /* 기본값 사용 */ }
    // 멀티셀렉트 초기화
    createMultiSelect('msTrigger', 'msDropdown', 'msPlaceholder');
    createMultiSelect('mMsTrigger', 'mMsDropdown', 'mMsPlaceholder');
    populateSelects();
    renderMultiSelectOptions('msTrigger');
    renderMultiSelectTrigger('msTrigger');
    renderMultiSelectOptions('mMsTrigger');
    renderMultiSelectTrigger('mMsTrigger');
    renderLegend();
  }

  /* ── 키패드 잠금 ── */
  let _lockBuf = '';

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('pd' + i);
      if (!d) continue;
      d.classList.remove('filled', 'error');
      if (i < _lockBuf.length) d.classList.add('filled');
    }
  }

  function shakeError() {
    const kp = document.querySelector('.pw-keypad');
    const dots = document.querySelector('.pw-dots');
    [kp, dots].forEach(el => {
      if (!el) return;
      el.style.animation = 'none';
      requestAnimationFrame(() => { el.style.animation = 'shake .35s ease'; });
    });
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('pd' + i);
      if (d) { d.classList.remove('filled'); d.classList.add('error'); }
    }
    setTimeout(() => {
      for (let i = 0; i < 4; i++) {
        const d = document.getElementById('pd' + i);
        if (d) d.classList.remove('error');
      }
    }, 600);
  }

  window.lockKey = function(n) {
    if (_lockBuf.length >= 4) return;
    _lockBuf += n;
    updateDots();
    document.getElementById('lockError').textContent = '';
    if (_lockBuf.length === 4) {
      setTimeout(() => checkAndUnlock(), 120);
    }
  };

  window.lockDel = function() {
    if (!_lockBuf.length) return;
    _lockBuf = _lockBuf.slice(0, -1);
    updateDots();
  };

  function checkAndUnlock() {
    if (_lockBuf === currentPassword) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('lockError').textContent = '';
      _lockBuf = '';
      updateDots();
    } else {
      document.getElementById('lockError').textContent = '비밀번호가 틀렸어요';
      shakeError();
      _lockBuf = '';
      setTimeout(() => updateDots(), 600);
    }
  }
  window.logout = function() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('lockScreen').style.display = 'flex';
    document.getElementById('lockError').textContent = '';
    _lockBuf = ''; updateDots();
  };

  /* ── 커스텀 시간 피커 ── */
  // 버튼 ID → { hourId, minId } 매핑
  const TP_PAIRS = {
    start:     { h: 'startHour',     m: 'startMin',     eh: 'endHour',     em: 'endMin'     },
    mStart:    { h: 'mStartHour',    m: 'mStartMin',    eh: 'mEndHour',    em: 'mEndMin'    },
    editStart: { h: 'editStartHour', m: 'editStartMin', eh: 'editEndHour', em: 'editEndMin' },
    end:       { h: 'endHour',       m: 'endMin'     },
    mEnd:      { h: 'mEndHour',      m: 'mEndMin'    },
    editEnd:   { h: 'editEndHour',   m: 'editEndMin' },
  };

  let _tpActive = null; // { btnEl, type, target }

  function getTimeVal(hourId, minId) {
    return document.getElementById(hourId).textContent.padStart(2,'0') + ':' +
           document.getElementById(minId).textContent.padStart(2,'0');
  }

  function setTimeVal(hourId, minId, timeStr) {
    if (!timeStr) return;
    const [h, m] = timeStr.split(':');
    const hNum = parseInt(h || '9', 10);
    let mNum = parseInt(m || '0', 10);
    mNum = Math.round(mNum / 10) * 10;
    if (mNum > 50) mNum = 50;
    document.getElementById(hourId).textContent = String(hNum).padStart(2,'0');
    document.getElementById(minId).textContent  = String(mNum).padStart(2,'0');
  }

  function autoSetEndTime(startHourId, startMinId, endHourId, endMinId) {
    let h = parseInt(document.getElementById(startHourId).textContent, 10);
    const m = parseInt(document.getElementById(startMinId).textContent, 10);
    h = Math.min(h + 1, 24);
    document.getElementById(endHourId).textContent = String(h).padStart(2,'0');
    document.getElementById(endMinId).textContent  = String(m).padStart(2,'0');
  }

  function openTpPopup(btnEl, type, target) {
    _tpActive = { btnEl, type, target };
    const popup = document.getElementById('tpPopup');
    const grid  = document.getElementById('tpGrid');
    const title = document.getElementById('tpPopupTitle');
    const curVal = parseInt(btnEl.textContent, 10);

    grid.innerHTML = '';
    if (type === 'hour') {
      title.textContent = '시(Hour)';
      grid.className = 'tp-grid hour-grid';
      for (let v = 0; v <= 24; v++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tp-cell' + (v === curVal ? ' selected' : '');
        btn.textContent = String(v).padStart(2,'0');
        btn.addEventListener('click', () => pickTpValue(v));
        grid.appendChild(btn);
      }
    } else {
      title.textContent = '분(Min)';
      grid.className = 'tp-grid min-grid';
      for (let v = 0; v <= 50; v += 10) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tp-cell' + (v === curVal ? ' selected' : '');
        btn.textContent = String(v).padStart(2,'0');
        btn.addEventListener('click', () => pickTpValue(v));
        grid.appendChild(btn);
      }
    }

    // 팝업 위치 계산
    const rect = btnEl.getBoundingClientRect();
    popup.style.display = 'block'; // 크기 계산용 임시
    const pw = popup.offsetWidth;
    const ph = popup.offsetHeight;
    let left = rect.left;
    let top  = rect.bottom + 4;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    if (top + ph > window.innerHeight - 8) top = rect.top - ph - 4;
    popup.style.left = left + 'px';
    popup.style.top  = top + 'px';
    popup.classList.add('show');
    btnEl.classList.add('open');
  }

  function pickTpValue(val) {
    if (!_tpActive) return;
    const { btnEl, type, target } = _tpActive;
    btnEl.textContent = String(val).padStart(2,'0');
    closeTpPopup();

    // 시작시간 변경 시 종료시간 자동 +1시간
    const isStart = target === 'start' || target === 'mStart' || target === 'editStart';
    if (isStart) {
      const pair = TP_PAIRS[target];
      autoSetEndTime(pair.h, pair.m, pair.eh, pair.em);
    }
  }

  /* ── 캘린더 렌더 ── */
  function renderCalendar() {
    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    document.getElementById('monthTitle').textContent = `${y}년 ${m+1}월`;
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const daysInPrev = new Date(y, m, 0).getDate();
    const tk = `${y}-${String(m+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
    const todayFull = new Date(); const tk2 = `${todayFull.getFullYear()}-${String(todayFull.getMonth()+1).padStart(2,'0')}-${String(todayFull.getDate()).padStart(2,'0')}`;

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      let day, isOther = false;
      if (i < firstDay) { day = daysInPrev - firstDay + i + 1; isOther = true; }
      else if (i >= firstDay + daysInMonth) { day = i - firstDay - daysInMonth + 1; isOther = true; }
      else { day = i - firstDay + 1; }
      const key = isOther ? null : `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if (isOther) cell.classList.add('other-month');
      if (key === tk2) cell.classList.add('today');
      if (key && selectedDate === key) cell.classList.add('selected');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = day;
      cell.appendChild(numEl);

      if (key && reservations[key]) {
        const entries = Object.values(reservations[key]);
        if (entries.length > 0) {
          const badges = document.createElement('div');
          badges.className = 'day-badges';
          const seen = {};
          entries.sort((a,b)=>a.start.localeCompare(b.start)).forEach(r => {
            if (!seen[r.room]) {
              seen[r.room] = true;
              const room = getRoomById(r.room);
              const b = document.createElement('div');
              b.className = 'badge';
              b.style.background = room.color;
              b.textContent = room.name.split(' ').slice(-1)[0];
              badges.appendChild(b);
            }
          });
          cell.appendChild(badges);
        }
      }
      if (!isOther) cell.addEventListener('click', () => selectDate(key, y, m, day));
      grid.appendChild(cell);
    }
  }

  /* ── 중복 시간 체크 ── */
  function checkOverlap(dateKey, roomId, start, end, excludeKey=null) {
    const dayRes = reservations[dateKey] || {};
    for (const [key, r] of Object.entries(dayRes)) {
      if (key === excludeKey) continue;
      if (r.room !== roomId) continue;
      // 시간 겹침: start1 < end2 && end1 > start2
      if (start < r.end && end > r.start) {
        return r; // 겹치는 예약 반환
      }
    }
    return null;
  }

  window.openEditModal = function(dateKey, fbKey) {

    editingDateKey = dateKey;

      opt.value = rm.id; opt.textContent = rm.name;

  window.saveEditReservation = async function() {
    const name = document.getElementById('editName').value.trim();
    const room = document.getElementById('editRoom').value;
    const start = getTimeVal('editStartHour', 'editStartMin');
    const end = getTimeVal('editEndHour', 'editEndMin');
    const memo = document.getElementById('editMemo').value.trim();
    const errEl = document.getElementById('editError');
    const warnEl = document.getElementById('editOverlapWarn');
    errEl.textContent = '';
    warnEl.classList.remove('show');
    if (!name) { errEl.textContent = '예약자 이름을 입력해주세요'; return; }
    if (start >= end) { errEl.textContent = '종료 시간은 시작 시간보다 늦어야 해요'; return; }
    // 중복 체크 (자기 자신 제외)
    const overlap = checkOverlap(editingDateKey, room, start, end, editingFbKey);
    if (overlap) {
      const rm = getRoomById(room);
      warnEl.textContent = `⚠️ 이미 "${rm.name}"에 ${overlap.start}~${overlap.end} 예약이 있어요 (${overlap.name})`;
      warnEl.classList.add('show');
      return;
    }
    const btn = document.getElementById('editConfirmBtn');
    btn.disabled = true; btn.textContent = '저장 중...';
    try {
      await set(ref(db, `reservations/${editingDateKey}/${editingFbKey}`), {name, room, start, end, memo, createdAt: reservations[editingDateKey][editingFbKey].createdAt || Date.now(), updatedAt: Date.now()});
      closeEditModal();
      showToast('예약이 수정되었어요! ✓');
    } catch(e) { errEl.textContent = '저장 실패: ' + e.message; }
    finally { btn.disabled = false; btn.textContent = '저장'; }
  };

  window.addReservation = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const selectedRooms = msInstances['msTrigger']?.selectedIds || [];
    const start = getTimeVal('startHour', 'startMin');
    const end = getTimeVal('endHour', 'endMin');
    const memo = document.getElementById('memoInput').value.trim();
    if (!selectedDate) { showToast('날짜를 먼저 선택해주세요', true); return; }
    if (!name) { showToast('예약자 이름을 입력해주세요', true); return; }
    if (selectedRooms.length === 0) { showToast('예약 항목을 하나 이상 선택해주세요', true); return; }
    if (start >= end) { showToast('종료 시간은 시작 시간보다 늦어야 해요', true); return; }
    // 중복 체크 (선택된 모든 항목)
    for (const roomId of selectedRooms) {
      const overlap = checkOverlap(selectedDate, roomId, start, end);
      if (overlap) {
        const rm = getRoomById(roomId);
        showToast(`⚠️ "${rm.name}" ${overlap.start}~${overlap.end}에 이미 예약이 있어요`, true);
        return;
      }
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '저장 중...';
    try {
      for (const roomId of selectedRooms) {
        await doAddReservation(name, roomId, start, end, memo);
      }
      document.getElementById('nameInput').value = '';
      resetMultiSelect('msTrigger');
      document.getElementById('memoInput').value = '';
      showToast(selectedRooms.length > 1 ? `${selectedRooms.length}개 항목 예약이 등록되었어요! ✓` : '예약이 등록되었어요! ✓');
    } catch(e) { showToast('저장 실패: ' + e.message, true); }
    finally { btn.disabled = false; btn.textContent = '예약 등록'; }
  };

    const picker = document.getElementById('colorPicker');
    picker.innerHTML = '';
    COLOR_SWATCHES.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (editingRooms[idx].color === c ? ' selected' : '');
      sw.style.background = c;
      sw.addEventListener('click', e => { e.stopPropagation(); pickColor(idx, c); });
      picker.appendChild(sw);
    });
    const rect = targetEl.getBoundingClientRect();
    picker.style.top = (rect.bottom + window.scrollY + 6) + 'px';
    picker.style.left = (rect.left + window.scrollX) + 'px';
    picker.classList.add('show');
  }

  function pickColor(idx, color) {
    editingRooms[idx].color = color;
    renderRoomList();
    hideColorPicker();
  }

  function hideColorPicker() {
    document.getElementById('colorPicker').classList.remove('show');
    activeColorTarget = null;
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('#colorPicker') && !e.target.closest('.room-color-dot')) hideColorPicker();
  });

  /* ── Firebase 리스너 ── */
  onValue(ref(db, 'reservations'), (snap) => {
    reservations = snap.val() || {};
    renderCalendar();
    if (selectedDate) { renderResList(); renderMdpList(); }
    document.getElementById('syncDot').className = 'sync-dot';
    document.getElementById('syncLabel').textContent = '연결됨';
  }, () => {
    document.getElementById('syncDot').className = 'sync-dot off';
    document.getElementById('syncLabel').textContent = '오류';
  });

  // rooms 변경도 실시간 반영
  onValue(ref(db, 'config/rooms'), (snap) => {
    if (snap.exists()) {
      rooms = snap.val();
      populateSelects();
      renderMultiSelectOptions('msTrigger');
      renderMultiSelectTrigger('msTrigger');
      renderMultiSelectOptions('mMsTrigger');
      renderMultiSelectTrigger('mMsTrigger');
      renderLegend();
      renderCalendar();
    }
  });

  document.getElementById('prevBtn').addEventListener('click', () => { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1); renderCalendar(); });
  document.getElementById('nextBtn').addEventListener('click', () => { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1); renderCalendar(); });

  await loadConfig();
  renderCalendar();
</script>
<script>
// ── 캐시 새로고침 ──
window.hardRefresh = async function() {
  const btn = event && event.target;
  if (btn) { btn.textContent = '🔄 초기화중...'; btn.style.color = '#7dd3fc'; }
  try {
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  } catch(e) { console.warn('캐시 삭제 오류:', e); }
  location.reload(true);
};
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('SW 등록 성공'))
    .catch(err => console.log('SW 실패', err));
}
</script>
