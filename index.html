<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사내 예약 시스템</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a3a5c;
    --primary-light: #2d5f8a;
    --accent: #e8a020;
    --bg: #f4f6f9;
    --surface: #ffffff;
    --border: #dde3ec;
    --text: #1a2433;
    --text-muted: #7a8ba0;
    --room1: #3b82f6;
    --room2: #8b5cf6;
    --room3: #10b981;
    --parking: #f59e0b;
    --car: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--primary);
    color: white;
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header .subtitle { font-size: 12px; opacity: 0.7; font-weight: 300; }

  .sync-status {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sync-status.online { background: rgba(16,185,129,0.2); color: #6ee7b7; }
  .sync-status.offline { background: rgba(239,68,68,0.2); color: #fca5a5; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; }
  .sync-status.online .sync-dot { background: #10b981; }
  .sync-status.offline .sync-dot { background: #ef4444; }

  .main-layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.5rem;
    padding: 1.5rem 2rem;
    max-width: 1300px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .calendar-header h2 { font-size: 18px; font-weight: 700; color: var(--primary); }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px; height: 36px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--bg); }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0.75rem 1.5rem 0.5rem;
    gap: 4px;
  }

  .weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .weekday:first-child { color: #ef4444; }
  .weekday:last-child { color: #3b82f6; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0.5rem 1.5rem 1.5rem;
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    padding: 6px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-height: 80px;
    border: 1px solid transparent;
  }

  .day-cell:hover:not(.empty):not(.other-month) { background: #eef3fa; border-color: var(--border); }
  .day-cell.today { background: #eff6ff; border-color: #93c5fd; }
  .day-cell.selected { background: var(--primary); border-color: var(--primary); }
  .day-cell.selected .day-num { color: white !important; }
  .day-cell.other-month { opacity: 0.35; cursor: default; }
  .day-cell.empty { cursor: default; }

  .day-num {
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    color: var(--text);
    margin-bottom: 4px;
  }

  .day-cell:nth-child(7n+1) .day-num { color: #ef4444; }
  .day-cell:nth-child(7n) .day-num { color: #3b82f6; }

  .day-badges { display: flex; flex-wrap: wrap; gap: 2px; width: 100%; }

  .badge {
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 4px;
    color: white;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .badge.r1 { background: var(--room1); }
  .badge.r2 { background: var(--room2); }
  .badge.r3 { background: var(--room3); }
  .badge.p  { background: var(--parking); }
  .badge.c  { background: var(--car); }

  .sidebar { display: flex; flex-direction: column; gap: 1rem; }

  .panel-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-header h3 { font-size: 15px; font-weight: 700; color: var(--primary); }

  .selected-date-label {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .form-body { padding: 1.25rem 1.5rem; }
  .form-group { margin-bottom: 1rem; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--primary-light); }

  .time-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .time-sep { font-size: 14px; color: var(--text-muted); text-align: center; }

  .submit-btn {
    width: 100%;
    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 0.5rem;
  }
  .submit-btn:hover { background: var(--primary-light); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .res-list { padding: 0 1.5rem 1.5rem; max-height: 400px; overflow-y: auto; }

  .res-empty {
    padding: 2rem 0;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.8;
  }

  .res-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .res-item:last-child { border-bottom: none; }

  .res-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .res-info { flex: 1; }
  .res-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .res-time { font-size: 12px; color: var(--text-muted); }
  .res-who { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .res-delete {
    background: none;
    border: none;
    color: #cbd5e1;
    cursor: pointer;
    font-size: 16px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .res-delete:hover { color: #ef4444; }

  .legend {
    padding: 1rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    border-top: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: #ef4444; }

  .loading-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    z-index: 300;
  }

  @media (max-width: 900px) {
    .main-layout { grid-template-columns: 1fr; padding: 1rem; }
    .sidebar { order: -1; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div>
    <h1>사내 예약 시스템</h1>
    <div class="subtitle">회의실 · 주차장 · 법인차량 예약</div>
  </div>
  <div class="sync-status online" id="syncStatus">
    <div class="sync-dot"></div>
    <span>실시간 연결</span>
  </div>
</header>

<div class="main-layout">
  <!-- Calendar -->
  <div class="card">
    <div class="calendar-header">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <h2 id="monthTitle"></h2>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </div>
    <div class="weekdays">
      <div class="weekday">일</div>
      <div class="weekday">월</div>
      <div class="weekday">화</div>
      <div class="weekday">수</div>
      <div class="weekday">목</div>
      <div class="weekday">금</div>
      <div class="weekday">토</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--room1)"></div>2층 회의실1</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--room2)"></div>2층 회의실2</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--room3)"></div>5층 회의실1</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--parking)"></div>주차장</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--car)"></div>법인차량</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="card">
      <div class="panel-header">
        <h3>예약 신청</h3>
        <span class="selected-date-label" id="selectedDateLabel">날짜를 선택하세요</span>
      </div>
      <div class="form-body">
        <div class="form-group">
          <label class="form-label">예약자 이름</label>
          <input type="text" class="form-input" id="nameInput" placeholder="이름 입력">
        </div>
        <div class="form-group">
          <label class="form-label">예약 항목</label>
          <select class="form-select" id="roomSelect">
            <option value="">선택하세요</option>
            <option value="r1">2층 회의실 1</option>
            <option value="r2">2층 회의실 2</option>
            <option value="r3">5층 회의실 1</option>
            <option value="p">주차장</option>
            <option value="c">법인 차량</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">예약 시간</label>
          <div class="time-row">
            <input type="time" class="form-input" id="startTime" value="09:00">
            <span class="time-sep">~</span>
            <input type="time" class="form-input" id="endTime" value="10:00">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">메모 (선택)</label>
          <input type="text" class="form-input" id="memoInput" placeholder="용도, 참석자 등">
        </div>
        <button class="submit-btn" id="submitBtn" onclick="addReservation()">예약 등록</button>
      </div>
    </div>

    <div class="card">
      <div class="panel-header">
        <h3 id="listTitle">당일 예약 현황</h3>
      </div>
      <div class="res-list" id="resList">
        <div class="res-empty">날짜를 선택하면<br>예약 현황을 볼 수 있어요</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCitGkZcA9rop79BtXJzTBFeez05EYhDoM",
    authDomain: "reservation-928c2.firebaseapp.com",
    databaseURL: "https://reservation-928c2-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "reservation-928c2",
    storageBucket: "reservation-928c2.firebasestorage.app",
    messagingSenderId: "744951363022",
    appId: "1:744951363022:web:5cd0645879e349c5ece79f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const ROOMS = {
    r1: { name: '2층 회의실 1', color: '#3b82f6', cls: 'r1' },
    r2: { name: '2층 회의실 2', color: '#8b5cf6', cls: 'r2' },
    r3: { name: '5층 회의실 1', color: '#10b981', cls: 'r3' },
    p:  { name: '주차장',       color: '#f59e0b', cls: 'p'  },
    c:  { name: '법인 차량',    color: '#ef4444', cls: 'c'  }
  };

  let reservations = {};
  let currentDate = new Date();
  let selectedDate = null;

  function setLoading(on) {
    document.getElementById('loadingBar').style.width = on ? '70%' : '100%';
    if (!on) setTimeout(() => { document.getElementById('loadingBar').style.width = '0%'; }, 300);
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function todayKey() {
    const t = new Date();
    return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
  }

  // Firebase 실시간 리스너
  const dbRef = ref(db, 'reservations');
  onValue(dbRef, (snapshot) => {
    reservations = snapshot.val() || {};
    renderCalendar();
    if (selectedDate) renderResList();
    // 연결 상태 표시
    const s = document.getElementById('syncStatus');
    s.className = 'sync-status online';
    s.innerHTML = '<div class="sync-dot"></div><span>실시간 연결</span>';
  }, (error) => {
    const s = document.getElementById('syncStatus');
    s.className = 'sync-status offline';
    s.innerHTML = '<div class="sync-dot"></div><span>연결 오류</span>';
  });

  function renderCalendar() {
    const y = currentDate.getFullYear();
    const m = currentDate.getMonth();
    document.getElementById('monthTitle').textContent = `${y}년 ${m+1}월`;

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const daysInPrev = new Date(y, m, 0).getDate();
    const tk = todayKey();

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      let day, isOther = false;
      if (i < firstDay) {
        day = daysInPrev - firstDay + i + 1;
        isOther = true;
      } else if (i >= firstDay + daysInMonth) {
        day = i - firstDay - daysInMonth + 1;
        isOther = true;
      } else {
        day = i - firstDay + 1;
      }

      const key = isOther ? null : dateKey(y, m, day);
      if (isOther) cell.classList.add('other-month');
      if (key === tk) cell.classList.add('today');
      if (key && selectedDate === key) cell.classList.add('selected');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = day;
      cell.appendChild(numEl);

      if (key && reservations[key]) {
        const entries = Object.values(reservations[key]);
        if (entries.length > 0) {
          const badges = document.createElement('div');
          badges.className = 'day-badges';
          const seen = {};
          entries.sort((a,b) => a.start.localeCompare(b.start)).forEach(r => {
            if (!seen[r.room]) {
              seen[r.room] = true;
              const b = document.createElement('div');
              b.className = 'badge ' + ROOMS[r.room].cls;
              b.textContent = ROOMS[r.room].name.split(' ').slice(-1)[0];
              badges.appendChild(b);
            }
          });
          cell.appendChild(badges);
        }
      }

      if (!isOther) {
        cell.addEventListener('click', () => selectDate(key, y, m, day));
      }
      grid.appendChild(cell);
    }
  }

  function selectDate(key, y, m, day) {
    selectedDate = key;
    document.getElementById('selectedDateLabel').textContent = `${y}년 ${m+1}월 ${day}일`;
    document.getElementById('listTitle').textContent = `${m+1}월 ${day}일 예약`;
    renderCalendar();
    renderResList();
  }

  function renderResList() {
    const list = document.getElementById('resList');
    if (!selectedDate || !reservations[selectedDate]) {
      list.innerHTML = '<div class="res-empty">이 날 예약이 없어요</div>';
      return;
    }

    const items = Object.entries(reservations[selectedDate])
      .map(([fbKey, v]) => ({ ...v, fbKey }))
      .sort((a,b) => a.start.localeCompare(b.start));

    if (items.length === 0) {
      list.innerHTML = '<div class="res-empty">이 날 예약이 없어요</div>';
      return;
    }

    list.innerHTML = '';
    items.forEach(r => {
      const room = ROOMS[r.room];
      const el = document.createElement('div');
      el.className = 'res-item';
      el.innerHTML = `
        <div class="res-dot" style="background:${room.color}"></div>
        <div class="res-info">
          <div class="res-name">${room.name}</div>
          <div class="res-time">${r.start} ~ ${r.end}</div>
          <div class="res-who">예약자: ${r.name}${r.memo ? ' · ' + r.memo : ''}</div>
        </div>
        <button class="res-delete" data-date="${selectedDate}" data-key="${r.fbKey}" title="삭제">✕</button>
      `;
      el.querySelector('.res-delete').addEventListener('click', (e) => {
        const d = e.target.dataset.date;
        const k = e.target.dataset.key;
        deleteReservation(d, k);
      });
      list.appendChild(el);
    });
  }

  window.addReservation = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const room = document.getElementById('roomSelect').value;
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;
    const memo = document.getElementById('memoInput').value.trim();

    if (!selectedDate) { showToast('날짜를 먼저 선택해주세요', true); return; }
    if (!name) { showToast('예약자 이름을 입력해주세요', true); return; }
    if (!room) { showToast('예약 항목을 선택해주세요', true); return; }
    if (!start || !end) { showToast('시간을 입력해주세요', true); return; }
    if (start >= end) { showToast('종료 시간은 시작 시간보다 늦어야 해요', true); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '저장 중...';
    setLoading(true);

    try {
      const newRef = push(ref(db, `reservations/${selectedDate}`));
      await set(newRef, { name, room, start, end, memo, createdAt: Date.now() });
      document.getElementById('nameInput').value = '';
      document.getElementById('roomSelect').value = '';
      document.getElementById('memoInput').value = '';
      showToast('예약이 등록되었어요! ✓');
    } catch(e) {
      showToast('저장 실패: ' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '예약 등록';
      setLoading(false);
    }
  };

  async function deleteReservation(dateKey, fbKey) {
    if (!confirm('예약을 삭제하시겠어요?')) return;
    setLoading(true);
    try {
      await remove(ref(db, `reservations/${dateKey}/${fbKey}`));
      showToast('삭제되었어요');
    } catch(e) {
      showToast('삭제 실패: ' + e.message, true);
    } finally {
      setLoading(false);
    }
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
    renderCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
    renderCalendar();
  });
