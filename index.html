<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>사내 예약 시스템</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a3a5c;
    --primary-light: #2d5f8a;
    --bg: #f4f6f9;
    --surface: #ffffff;
    --border: #dde3ec;
    --text: #1a2433;
    --text-muted: #7a8ba0;
    --room1: #3b82f6;
    --room2: #8b5cf6;
    --room3: #10b981;
    --parking: #f59e0b;
    --car: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 잠금 화면 ── */
  #lockScreen {
    position: fixed; inset: 0;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  .lock-box {
    background: white; border-radius: 16px;
    padding: 2.5rem 2rem; width: 90%; max-width: 320px;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .lock-icon { font-size: 40px; margin-bottom: 1rem; }
  .lock-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 0.25rem; }
  .lock-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .lock-input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 20px; font-family: inherit;
    text-align: center; letter-spacing: 8px;
    outline: none; margin-bottom: 1rem; transition: border-color 0.15s;
  }
  .lock-input:focus { border-color: var(--primary); }
  .lock-input.error { border-color: #ef4444; animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .lock-btn {
    width: 100%; padding: 13px;
    background: var(--primary); color: white;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer;
  }
  .lock-error { font-size: 12px; color: #ef4444; margin-top: 0.5rem; min-height: 18px; }

  /* ── 앱 ── */
  #app { display: none; }

  header {
    background: var(--primary); color: white;
    padding: 0 1rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left h1 { font-size: 15px; font-weight: 700; }
  .header-left .subtitle { font-size: 10px; opacity: 0.7; }
  .header-right { display: flex; align-items: center; gap: 6px; }

  .sync-dot-wrap { display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }
  .sync-dot.off { background: #ef4444; }
  .sync-label { font-size: 10px; color: #6ee7b7; }

  .hdr-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 5px 9px; border-radius: 16px;
    font-size: 11px; font-family: inherit; cursor: pointer;
    white-space: nowrap;
  }

  /* ── 탭 (모바일용) ── */
  .tab-bar {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 56px; z-index: 90;
  }
  .tab-bar button {
    flex: 1; padding: 12px 0;
    background: none; border: none;
    font-size: 13px; font-weight: 500; font-family: inherit;
    color: var(--text-muted); cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tab-bar button.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* ── 레이아웃 ── */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.5rem;
    padding: 1.5rem 1.5rem;
    max-width: 1300px; margin: 0 auto;
  }

  .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }

  /* ── 캘린더 ── */
  .calendar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
  }
  .calendar-header h2 { font-size: 17px; font-weight: 700; color: var(--primary); }
  .nav-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    width: 34px; height: 34px; cursor: pointer; font-size: 16px; color: var(--text);
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: var(--bg); }

  .weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    padding: 8px 10px 4px; gap: 2px;
  }
  .weekday { text-align: center; font-size: 11px; font-weight: 500; color: var(--text-muted); padding: 2px 0; }
  .weekday:first-child { color: #ef4444; }
  .weekday:last-child { color: #3b82f6; }

  .days-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    padding: 4px 10px 10px; gap: 3px;
  }

  /* PC용 날짜 셀 */
  .day-cell {
    border-radius: 8px; padding: 5px 4px;
    cursor: pointer; transition: background 0.15s;
    display: flex; flex-direction: column; align-items: flex-start;
    min-height: 70px; border: 1px solid transparent;
  }
  .day-cell:hover:not(.other-month) { background: #eef3fa; border-color: var(--border); }
  .day-cell.today { background: #eff6ff; border-color: #93c5fd; }
  .day-cell.selected { background: var(--primary); border-color: var(--primary); }
  .day-cell.selected .day-num { color: white !important; }
  .day-cell.other-month { opacity: 0.3; cursor: default; }

  .day-num { font-size: 12px; font-weight: 600; line-height: 1; color: var(--text); margin-bottom: 3px; }
  .day-cell:nth-child(7n+1) .day-num { color: #ef4444; }
  .day-cell:nth-child(7n) .day-num { color: #3b82f6; }

  /* 배지: PC는 텍스트, 모바일은 점 */
  .day-badges { display: flex; flex-wrap: wrap; gap: 2px; width: 100%; }
  .badge {
    font-size: 9px; padding: 1px 4px; border-radius: 3px;
    color: white; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }
  .badge.r1{background:var(--room1)} .badge.r2{background:var(--room2)}
  .badge.r3{background:var(--room3)} .badge.p{background:var(--parking)} .badge.c{background:var(--car)}

  /* 사이드바 */
  .sidebar { display: flex; flex-direction: column; gap: 1rem; }
  .panel-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-header h3 { font-size: 14px; font-weight: 700; color: var(--primary); }
  .selected-date-label { font-size: 11px; color: var(--text-muted); background: var(--bg); padding: 3px 9px; border-radius: 20px; font-weight: 500; }

  .form-body { padding: 1rem 1.25rem; }
  .form-group { margin-bottom: 0.85rem; }
  .form-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-select {
    width: 100%; padding: 9px 11px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; font-family: inherit; color: var(--text);
    background: var(--surface); outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--primary-light); }
  .time-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px; align-items: center; }
  .time-sep { font-size: 13px; color: var(--text-muted); text-align: center; }
  .submit-btn {
    width: 100%; padding: 11px;
    background: var(--primary); color: white;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-top: 0.4rem;
  }
  .submit-btn:hover { background: var(--primary-light); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .res-list { padding: 0 1.25rem 1.25rem; max-height: 380px; overflow-y: auto; }
  .res-empty { padding: 1.5rem 0; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 1.8; }
  .res-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .res-item:last-child { border-bottom: none; }
  .res-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .res-info { flex: 1; }
  .res-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .res-time { font-size: 12px; color: var(--text-muted); }
  .res-who { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .res-delete { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 15px; padding: 0; line-height: 1; }
  .res-delete:hover { color: #ef4444; }

  .legend { padding: 0.75rem 1.25rem; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 500; padding: 1rem; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: white; border-radius: 16px; padding: 1.75rem; width: 100%; max-width: 320px; }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 1.2rem; }
  .modal-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.15s; margin-bottom: 0.7rem; }
  .modal-input:focus { border-color: var(--primary); }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0.75rem; }
  .modal-cancel { padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; }
  .modal-confirm { padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .modal-error { font-size: 12px; color: #ef4444; min-height: 16px; margin-top: 2px; }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--primary); color: white; padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 600; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #ef4444; }

  .loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: #e8a020; width: 0%; transition: width 0.3s; z-index: 700; }

  /* ══════════════════════════════
     모바일 반응형 (768px 이하)
  ══════════════════════════════ */
  @media (max-width: 768px) {
    .tab-bar { display: flex; }

    .main-layout {
      grid-template-columns: 1fr;
      padding: 0.75rem;
      gap: 0;
    }

    /* 탭으로 전환 */
    .calendar-panel { display: block; }
    .sidebar { display: none; gap: 0.75rem; }
    .sidebar.active { display: flex; }

    /* 모바일 날짜 셀: 고정 높이 없애고 aspect-ratio 사용 */
    .days-grid { padding: 4px 6px 8px; gap: 2px; }
    .day-cell {
      min-height: unset;
      padding: 4px 3px;
      border-radius: 6px;
    }
    .day-num { font-size: 12px; margin-bottom: 2px; }

    /* 모바일 배지: 텍스트 대신 작은 점들로 표시 */
    .badge {
      font-size: 0;
      width: 7px; height: 7px;
      border-radius: 50%;
      padding: 0;
      flex-shrink: 0;
    }
    .day-badges { gap: 2px; flex-wrap: wrap; }

    .weekdays { padding: 6px 6px 2px; }
    .weekday { font-size: 10px; }

    .calendar-header { padding: 0.75rem 1rem; }
    .calendar-header h2 { font-size: 16px; }

    .legend { gap: 6px; padding: 0.6rem 1rem; }
    .legend-item { font-size: 10px; }

    .form-body { padding: 1rem; }
    .panel-header { padding: 0.85rem 1rem; }
    .res-list { max-height: none; padding: 0 1rem 1rem; }

    /* 사이드바 카드 사이 간격 */
    .sidebar > .card + .card { margin-top: 0.75rem; }
  }

  @media (max-width: 380px) {
    .day-num { font-size: 11px; }
    .badge { width: 6px; height: 6px; }
    .days-grid { gap: 1px; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<!-- 잠금 화면 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">사내 예약 시스템</div>
    <div class="lock-sub">비밀번호를 입력하세요</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="● ● ● ●" maxlength="20"
      onkeydown="if(event.key==='Enter') tryUnlock()">
    <button class="lock-btn" onclick="tryUnlock()">입장</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <div class="header-left">
      <h1>사내 예약 시스템</h1>
      <div class="subtitle">회의실 · 주차장 · 법인차량</div>
    </div>
    <div class="header-right">
      <div class="sync-dot-wrap">
        <div class="sync-dot" id="syncDot"></div>
        <span class="sync-label" id="syncLabel">연결됨</span>
      </div>
      <button class="hdr-btn" onclick="openPwModal()">🔑 비번변경</button>
      <button class="hdr-btn" onclick="logout()">나가기</button>
    </div>
  </header>

  <!-- 모바일 탭 -->
  <div class="tab-bar" id="tabBar">
    <button class="active" id="tabCal" onclick="switchTab('cal')">📅 캘린더</button>
    <button id="tabForm" onclick="switchTab('form')">✏️ 예약신청</button>
    <button id="tabList" onclick="switchTab('list')">📋 예약현황</button>
  </div>

  <div class="main-layout">
    <!-- 캘린더 -->
    <div class="card calendar-panel" id="calPanel">
      <div class="calendar-header">
        <button class="nav-btn" id="prevBtn">&#8249;</button>
        <h2 id="monthTitle"></h2>
        <button class="nav-btn" id="nextBtn">&#8250;</button>
      </div>
      <div class="weekdays">
        <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
        <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>
      </div>
      <div class="days-grid" id="daysGrid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--room1)"></div>2층 회의실1</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--room2)"></div>2층 회의실2</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--room3)"></div>5층 회의실1</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--parking)"></div>주차장</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--car)"></div>법인차량</div>
      </div>
    </div>

    <!-- 사이드바 -->
    <div class="sidebar" id="sidePanel">
      <div class="card" id="formCard">
        <div class="panel-header">
          <h3>예약 신청</h3>
          <span class="selected-date-label" id="selectedDateLabel">날짜를 선택하세요</span>
        </div>
        <div class="form-body">
          <div class="form-group">
            <label class="form-label">예약자 이름</label>
            <input type="text" class="form-input" id="nameInput" placeholder="이름 입력">
          </div>
          <div class="form-group">
            <label class="form-label">예약 항목</label>
            <select class="form-select" id="roomSelect">
              <option value="">선택하세요</option>
              <option value="r1">2층 회의실 1</option>
              <option value="r2">2층 회의실 2</option>
              <option value="r3">5층 회의실 1</option>
              <option value="p">주차장</option>
              <option value="c">법인 차량</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">예약 시간</label>
            <div class="time-row">
              <input type="time" class="form-input" id="startTime" value="09:00">
              <span class="time-sep">~</span>
              <input type="time" class="form-input" id="endTime" value="10:00">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">메모 (선택)</label>
            <input type="text" class="form-input" id="memoInput" placeholder="용도, 참석자 등">
          </div>
          <button class="submit-btn" id="submitBtn" onclick="addReservation()">예약 등록</button>
        </div>
      </div>

      <div class="card" id="listCard">
        <div class="panel-header">
          <h3 id="listTitle">당일 예약 현황</h3>
        </div>
        <div class="res-list" id="resList">
          <div class="res-empty">날짜를 선택하면<br>예약 현황을 볼 수 있어요</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="modal-overlay" id="pwModal">
  <div class="modal-box">
    <div class="modal-title">🔑 비밀번호 변경</div>
    <label class="modal-label">현재 비밀번호</label>
    <input type="password" class="modal-input" id="pwCurrent" placeholder="현재 비밀번호 입력">
    <label class="modal-label">새 비밀번호</label>
    <input type="password" class="modal-input" id="pwNew" placeholder="새 비밀번호 입력">
    <label class="modal-label">새 비밀번호 확인</label>
    <input type="password" class="modal-input" id="pwConfirm" placeholder="새 비밀번호 다시 입력">
    <div class="modal-error" id="pwError"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closePwModal()">취소</button>
      <button class="modal-confirm" onclick="changePassword()">변경하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCitGkZcA9rop79BtXJzTBFeez05EYhDoM",
    authDomain: "reservation-928c2.firebaseapp.com",
    databaseURL: "https://reservation-928c2-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "reservation-928c2",
    storageBucket: "reservation-928c2.firebasestorage.app",
    messagingSenderId: "744951363022",
    appId: "1:744951363022:web:5cd0645879e349c5ece79f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const ROOMS = {
    r1:{name:'2층 회의실 1',color:'#3b82f6',cls:'r1'},
    r2:{name:'2층 회의실 2',color:'#8b5cf6',cls:'r2'},
    r3:{name:'5층 회의실 1',color:'#10b981',cls:'r3'},
    p:{name:'주차장',color:'#f59e0b',cls:'p'},
    c:{name:'법인 차량',color:'#ef4444',cls:'c'}
  };

  let reservations = {}, currentDate = new Date(), selectedDate = null, currentPassword = '1234';
  const isMobile = () => window.innerWidth <= 768;

  function setLoading(on) {
    const b = document.getElementById('loadingBar');
    b.style.width = on ? '70%' : '100%';
    if (!on) setTimeout(() => b.style.width = '0%', 300);
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2500);
  }

  async function loadPassword() {
    try {
      const snap = await get(ref(db, 'config/password'));
      if (snap.exists()) currentPassword = snap.val();
      else await set(ref(db, 'config/password'), '1234');
    } catch(e) { currentPassword = '1234'; }
  }

  window.tryUnlock = function() {
    const val = document.getElementById('lockInput').value;
    const inp = document.getElementById('lockInput');
    if (val === currentPassword) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('lockError').textContent = '';
    } else {
      document.getElementById('lockError').textContent = '비밀번호가 틀렸어요';
      inp.classList.add('error');
      inp.value = '';
      setTimeout(() => inp.classList.remove('error'), 400);
    }
  };

  window.logout = function() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('lockScreen').style.display = 'flex';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockError').textContent = '';
  };

  // 모바일 탭 전환
  window.switchTab = function(tab) {
    const calPanel = document.getElementById('calPanel');
    const sidePanel = document.getElementById('sidePanel');
    const tabCal = document.getElementById('tabCal');
    const tabForm = document.getElementById('tabForm');
    const tabList = document.getElementById('tabList');
    const formCard = document.getElementById('formCard');
    const listCard = document.getElementById('listCard');

    [tabCal, tabForm, tabList].forEach(t => t.classList.remove('active'));

    if (tab === 'cal') {
      calPanel.style.display = 'block';
      sidePanel.style.display = 'none';
      tabCal.classList.add('active');
    } else if (tab === 'form') {
      calPanel.style.display = 'none';
      sidePanel.style.display = 'flex';
      formCard.style.display = 'block';
      listCard.style.display = 'none';
      tabForm.classList.add('active');
    } else {
      calPanel.style.display = 'none';
      sidePanel.style.display = 'flex';
      formCard.style.display = 'none';
      listCard.style.display = 'block';
      tabList.classList.add('active');
    }
  };

  window.openPwModal = function() {
    ['pwCurrent','pwNew','pwConfirm'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('pwError').textContent = '';
    document.getElementById('pwModal').classList.add('show');
  };
  window.closePwModal = function() { document.getElementById('pwModal').classList.remove('show'); };

  window.changePassword = async function() {
    const cur = document.getElementById('pwCurrent').value;
    const nw = document.getElementById('pwNew').value;
    const cf = document.getElementById('pwConfirm').value;
    const errEl = document.getElementById('pwError');
    if (cur !== currentPassword) { errEl.textContent = '현재 비밀번호가 틀렸어요'; return; }
    if (!nw) { errEl.textContent = '새 비밀번호를 입력해주세요'; return; }
    if (nw !== cf) { errEl.textContent = '새 비밀번호가 일치하지 않아요'; return; }
    try {
      await set(ref(db, 'config/password'), nw);
      currentPassword = nw;
      closePwModal();
      showToast('비밀번호가 변경되었어요! ✓');
    } catch(e) { errEl.textContent = '저장 실패: ' + e.message; }
  };

  function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function todayKey() { const t = new Date(); return dateKey(t.getFullYear(), t.getMonth(), t.getDate()); }

  onValue(ref(db, 'reservations'), (snap) => {
    reservations = snap.val() || {};
    renderCalendar();
    if (selectedDate) renderResList();
    document.getElementById('syncDot').className = 'sync-dot';
    document.getElementById('syncLabel').textContent = '연결됨';
  }, () => {
    document.getElementById('syncDot').className = 'sync-dot off';
    document.getElementById('syncLabel').textContent = '오류';
  });

  function renderCalendar() {
    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    document.getElementById('monthTitle').textContent = `${y}년 ${m+1}월`;
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const daysInPrev = new Date(y, m, 0).getDate();
    const tk = todayKey();
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      let day, isOther = false;
      if (i < firstDay) { day = daysInPrev - firstDay + i + 1; isOther = true; }
      else if (i >= firstDay + daysInMonth) { day = i - firstDay - daysInMonth + 1; isOther = true; }
      else { day = i - firstDay + 1; }
      const key = isOther ? null : dateKey(y, m, day);
      if (isOther) cell.classList.add('other-month');
      if (key === tk) cell.classList.add('today');
      if (key && selectedDate === key) cell.classList.add('selected');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = day;
      cell.appendChild(numEl);

      if (key && reservations[key]) {
        const entries = Object.values(reservations[key]);
        if (entries.length > 0) {
          const badges = document.createElement('div');
          badges.className = 'day-badges';
          const seen = {};
          entries.sort((a,b)=>a.start.localeCompare(b.start)).forEach(r => {
            if (!seen[r.room]) {
              seen[r.room] = true;
              const b = document.createElement('div');
              b.className = 'badge ' + ROOMS[r.room].cls;
              b.textContent = ROOMS[r.room].name.split(' ').slice(-1)[0]; // PC용 텍스트 (CSS로 모바일에선 숨김)
              badges.appendChild(b);
            }
          });
          cell.appendChild(badges);
        }
      }
      if (!isOther) {
        cell.addEventListener('click', () => {
          selectDate(key, y, m, day);
          // 모바일이면 날짜 클릭 시 예약현황 탭으로 자동 이동
          if (isMobile()) switchTab('list');
        });
      }
      grid.appendChild(cell);
    }
  }

  function selectDate(key, y, m, day) {
    selectedDate = key;
    document.getElementById('selectedDateLabel').textContent = `${y}년 ${m+1}월 ${day}일`;
    document.getElementById('listTitle').textContent = `${m+1}월 ${day}일 예약`;
    renderCalendar();
    renderResList();
  }

  function renderResList() {
    const list = document.getElementById('resList');
    if (!selectedDate || !reservations[selectedDate]) {
      list.innerHTML = '<div class="res-empty">이 날 예약이 없어요</div>'; return;
    }
    const items = Object.entries(reservations[selectedDate])
      .map(([fbKey, v]) => ({...v, fbKey}))
      .sort((a,b) => a.start.localeCompare(b.start));
    if (items.length === 0) { list.innerHTML = '<div class="res-empty">이 날 예약이 없어요</div>'; return; }
    list.innerHTML = '';
    items.forEach(r => {
      const room = ROOMS[r.room];
      const el = document.createElement('div');
      el.className = 'res-item';
      el.innerHTML = `
        <div class="res-dot" style="background:${room.color}"></div>
        <div class="res-info">
          <div class="res-name">${room.name}</div>
          <div class="res-time">${r.start} ~ ${r.end}</div>
          <div class="res-who">예약자: ${r.name}${r.memo?' · '+r.memo:''}</div>
        </div>
        <button class="res-delete" data-date="${selectedDate}" data-key="${r.fbKey}" title="삭제">✕</button>
      `;
      el.querySelector('.res-delete').addEventListener('click', e => {
        deleteReservation(e.target.dataset.date, e.target.dataset.key);
      });
      list.appendChild(el);
    });
  }

  window.addReservation = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const room = document.getElementById('roomSelect').value;
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;
    const memo = document.getElementById('memoInput').value.trim();
    if (!selectedDate) { showToast('날짜를 먼저 선택해주세요', true); return; }
    if (!name) { showToast('예약자 이름을 입력해주세요', true); return; }
    if (!room) { showToast('예약 항목을 선택해주세요', true); return; }
    if (!start || !end) { showToast('시간을 입력해주세요', true); return; }
    if (start >= end) { showToast('종료 시간은 시작 시간보다 늦어야 해요', true); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '저장 중...';
    setLoading(true);
    try {
      await set(push(ref(db, `reservations/${selectedDate}`)), {name, room, start, end, memo, createdAt: Date.now()});
      document.getElementById('nameInput').value = '';
      document.getElementById('roomSelect').value = '';
      document.getElementById('memoInput').value = '';
      showToast('예약이 등록되었어요! ✓');
      if (isMobile()) switchTab('list');
    } catch(e) { showToast('저장 실패: ' + e.message, true); }
    finally { btn.disabled = false; btn.textContent = '예약 등록'; setLoading(false); }
  };

  async function deleteReservation(dateKey, fbKey) {
    if (!confirm('예약을 삭제하시겠어요?')) return;
    setLoading(true);
    try { await remove(ref(db, `reservations/${dateKey}/${fbKey}`)); showToast('삭제되었어요'); }
    catch(e) { showToast('삭제 실패: ' + e.message, true); }
    finally { setLoading(false); }
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1);
    renderCalendar();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1);
    renderCalendar();
  });

  await loadPassword();
  renderCalendar();
</script>
</body>
</html>
